name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Büyük dosyayı ve istemediğimiz araçları çalışma dizininden kesin olarak silin
          rm -f apktool.jar
          rm -rf abe_multitool
          rm -f uber-apk-signer*.jar
          
          # 2. Mevcut .git geçmişini tamamen silip temiz bir Git alanı başlatın (CRITICAL)
          # Bu sayede geçmişteki hiçbir büyük dosya Hugging Face'e taşınmaz
          rm -rf .git
          git init -b main
          
          # 3. Git kimliklerini tanımlayın
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 4. Kalan tüm temiz kod dosyalarını sahneye ekleyin ve ilk commit'i oluşturun
          git add .
          git commit -m "Deploy app from GitHub Actions"
          
          # 5. Güvenli kimlik doğrulama ayarını yapın
          git config --global credential.helper store
          echo "https://sagiky:$HF_TOKEN@huggingface.co" > ~/.git-credentials
          
          # 6. Uzak depoyu ekleyip zorlayarak (force push) tertemiz yükleyin
          git remote add hf https://huggingface.co/spaces/sagiky/epiceditor
          git push --force hf main
