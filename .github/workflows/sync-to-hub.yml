name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Git kimlik bilgilerini ayarla
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Hugging Face Space deponuzu uzak sunucu (remote) olarak ekleyin
          # Token'ı URL içine güvenli bir şekilde gömüyoruz
          git remote add hf https://sagiky:$HF_TOKEN@huggingface.co/spaces/sagiky/epiceditor
          
          # Değişiklikleri Hugging Face 'main' branch'ine zorlayarak gönderin (force push)
          git push --force hf main
